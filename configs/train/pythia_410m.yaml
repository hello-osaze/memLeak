backend: huggingface_causal_lm
model_name: EleutherAI/pythia-410m-deduped
sequence_length: 1024
precision: bf16
optimizer: adamw
learning_rate: 2.0e-5
weight_decay: 0.1
warmup_ratio: 0.03
scheduler: cosine
num_train_epochs: 2
per_device_train_batch_size: 4
gradient_accumulation_steps: 16
effective_batch_size_sequences: 64
max_grad_norm: 1.0
save_steps: 1000
eval_steps: 1000
logging_steps: 50
seed: 1
