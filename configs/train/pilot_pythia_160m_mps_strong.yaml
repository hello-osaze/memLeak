backend: huggingface_causal_lm
model_name: EleutherAI/pythia-160m-deduped
sequence_length: 256
device: mps
precision: fp32
optimizer: adamw
optimizer_eps: 1.0e-4
learning_rate: 1.5e-6
weight_decay: 0.0
warmup_ratio: 0.0
scheduler: cosine
num_train_epochs: 2
per_device_train_batch_size: 1
gradient_accumulation_steps: 1
max_grad_norm: 1.0
save_steps: 0
eval_steps: 20
logging_steps: 5
seed: 1
