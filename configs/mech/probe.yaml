activation_groups:
  - success_low_cue_member
  - fail_low_cue_member
  - success_high_cue_member
  - low_cue_nonmember
max_examples_per_group: 500
cache_sites:
  - resid_post
cache_storage_dtype: float16
positions:
  - final_prompt_token
  - anchor_token
  - first_target_token_teacher_forced
probe:
  classifier: logistic_regression
  regularization: l2
  cv_folds: 5
top_k_layers_from_probe: 5
patch_pairs: 25
top_k_components: [1, 3, 5, 10]
alpha_grid: [0.0, 0.25, 0.5, 1.0, 2.0]
direction_top_k_layers: 5
utility_eval_max_examples: 8
