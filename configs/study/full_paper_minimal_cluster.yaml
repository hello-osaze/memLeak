study_name: full_paper_minimal_cluster
output_root: study_runs/full_paper_minimal_cluster

# Override this on the cluster with --background /abs/path/to/background.txt
background_path: data/raw/background_full.txt

records:
  config: configs/data/records_default.yaml
  output_name: full_paper_records.jsonl

conditions:
  C0_clean:
    corpus_config: configs/data/corpus_C0_clean.yaml
    seeds: [1]
  C1_exact_1x:
    corpus_config: configs/data/corpus_C1_exact_1x.yaml
    seeds: [1]
  C2_exact_10x:
    corpus_config: configs/data/corpus_C2_exact_10x.yaml
    seeds: [1, 2, 3]
  C3_fuzzy_5x:
    corpus_config: configs/data/corpus_C3_fuzzy_5x.yaml
    seeds: [1, 2, 3]
  C4_redacted:
    corpus_config: configs/data/corpus_C4_redacted.yaml
    seeds: [1]

training:
  config: configs/train/pythia_410m.yaml
  overrides:
    device: cuda

audit:
  split: test
  target_counts:
    member: 500
    nonmember: 500
    canary: 0
  sample_seed: 1
  generation_configs:
    - configs/generation/budget5.yaml
  analysis_generation_config: configs/generation/budget5.yaml
  include_failed_prompts: false

mechanistic:
  enabled: true
  config: configs/mech/probe.yaml
  focus_conditions: [C2_exact_10x, C3_fuzzy_5x]
  focus_seeds: [1]

provenance:
  enabled: true
  config: configs/provenance/grad_similarity.yaml
  focus_conditions: [C2_exact_10x, C3_fuzzy_5x]
  focus_seeds: [1]
  selection_unit_by_condition:
    C2_exact_10x: record
    C3_fuzzy_5x: cluster
  max_total_targets: 100
  max_targets_per_record: 1
  target_selection_metric: record_exact_then_logprob
  overrides:
    device: cuda
    last_n_layers: 1
    include_final_norm: true
    include_lm_head: false
    sequence_length: 256

removal:
  enabled: true
  focus_conditions: [C2_exact_10x, C3_fuzzy_5x]
  focus_seeds: [1]
  selection_unit_by_condition:
    C2_exact_10x: record
    C3_fuzzy_5x: cluster
  audit_generation_config: configs/generation/budget5.yaml
  run_mech_lite: true

storage:
  skip_existing: true
  remove_generation_after_scoring: true
  delete_intermediate_checkpoints: true
  remove_activation_cache_after_mech: true
  remove_removal_models_after_validation: true
  shared_rendered_docs: true
  shared_prompts: true

cluster:
  python_bin: python
  scheduler: slurm
  slurm:
    partition: gpu
    gres: gpu:1
    cpus_per_task: 8
    mem: 64G
    time: "48:00:00"
