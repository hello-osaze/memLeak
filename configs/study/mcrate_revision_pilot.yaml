study_name: mcrate_revision_pilot
output_root: study_runs/mcrate_revision_pilot

background_path: data/raw/backgrounds/c4_en_100m

records:
  config: configs/data/records_realistic_workshop_revision.yaml
  output_name: mcrate_revision_records.jsonl

conditions:
  C0_clean:
    corpus_config: configs/data/corpus_revision100_C0_clean.yaml
    seeds: [1]
  C2_exact_10x:
    corpus_config: configs/data/corpus_revision100_C2_exact_10x.yaml
    seeds: [1]
  C3_fuzzy_5x:
    corpus_config: configs/data/corpus_revision100_C3_fuzzy_5x.yaml
    seeds: [1]
  C4_redacted:
    corpus_config: configs/data/corpus_revision100_C4_redacted.yaml
    seeds: [1]

training:
  config: configs/train/pythia_410m.yaml
  overrides:
    device: cuda

audit:
  split: test
  target_counts:
    member: 1000
    nonmember: 1000
    canary: 0
  sample_seed: 1
  generation_configs:
    - configs/generation/budget5.yaml
    - configs/generation/budget20.yaml
  analysis_generation_config: configs/generation/budget20.yaml
  include_failed_prompts: false
  matching_variant: full
  cue_filter_strength: default
  cue_variant: full
  scoring_mode: S1

revision:
  enabled: true
  ablation_names: [none, sensitive_value_shuffle, anchor_shuffle]
  matching_variants: [full, family_only, strict]
  retain_raw_generations: true
  adaptive_attack:
    enabled: true
    generation_budgets: [20, 100]
    top_k: 10
    rounds: 5
    objectives: [raw, lift]
    attack_types: [B0_fixed_mcrate, B1_non_adversarial, B2_random_prompt_bank, B3_adaptive]
    seed: 1

mechanistic:
  enabled: false
  focus_conditions: []
  focus_seeds: []

provenance:
  enabled: false
  focus_conditions: []
  focus_seeds: []
  selection_unit_by_condition: {}
  max_total_targets: 0
  max_targets_per_record: 0
  overrides:
    device: cuda

removal:
  enabled: false
  focus_conditions: []
  focus_seeds: []
  selection_unit_by_condition: {}
  run_mech_lite: false

storage:
  skip_existing: true
  remove_generation_after_scoring: false
  delete_intermediate_checkpoints: true
  remove_activation_cache_after_mech: true
  remove_removal_models_after_validation: true
  shared_rendered_docs: false
  shared_prompts: false

cluster:
  python_bin: python
  scheduler: slurm
  slurm:
    partition: gpu
    gres: gpu:1
    cpus_per_task: 8
    mem: 80G
    time: "96:00:00"
