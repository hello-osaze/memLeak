study_name: paper_publication_cluster
output_root: study_runs/paper_publication_cluster

background_path: data/raw/background_full.txt

records:
  config: configs/data/records_publication.yaml
  output_name: paper_publication_records.jsonl

conditions:
  C0_clean:
    corpus_config: configs/data/corpus_C0_clean.yaml
    seeds: [1, 2, 3]
    render:
      exclude_families: [canary]
  C1_exact_1x:
    corpus_config: configs/data/corpus_C1_exact_1x.yaml
    seeds: [1, 2, 3]
    render:
      exclude_families: [canary]
  C2_exact_10x:
    corpus_config: configs/data/corpus_C2_exact_10x.yaml
    seeds: [1, 2, 3]
    render:
      exclude_families: [canary]
  C3_fuzzy_5x:
    corpus_config: configs/data/corpus_C3_fuzzy_5x.yaml
    seeds: [1, 2, 3]
    render:
      exclude_families: [canary]
  C4_redacted:
    corpus_config: configs/data/corpus_C4_redacted.yaml
    seeds: [1, 2, 3]
    render:
      exclude_families: [canary]
  C3_fuzzy_10x_event_only:
    corpus_config: configs/data/corpus_C3_fuzzy_10x_event_only.yaml
    seeds: [1, 2, 3]
    render:
      include_families: [event]
      exclude_families: [canary]
      repeat_count: 10
      variant_mode: fuzzy
      redact_sensitive_fields: false

training:
  config: configs/train/pythia_410m.yaml
  overrides:
    device: cuda

audit:
  split: test
  target_counts:
    member: 1000
    nonmember: 1000
    canary: 0
  sample_seed: 1
  generation_configs:
    - configs/generation/budget5.yaml
    - configs/generation/budget20_cold_long.yaml
    - configs/generation/budget32_cold_long.yaml
  analysis_generation_config: configs/generation/budget32_cold_long.yaml
  include_failed_prompts: false

mechanistic:
  enabled: true
  config: configs/mech/probe.yaml
  focus_conditions: [C2_exact_10x, C3_fuzzy_5x, C3_fuzzy_10x_event_only]
  focus_seeds: all

provenance:
  enabled: true
  config: configs/provenance/grad_similarity_publication.yaml
  focus_conditions: [C2_exact_10x, C3_fuzzy_5x, C3_fuzzy_10x_event_only]
  focus_seeds: all
  selection_unit_by_condition:
    C2_exact_10x: record
    C3_fuzzy_5x: cluster
    C3_fuzzy_10x_event_only: cluster
  max_total_targets: 250
  max_targets_per_record: 2
  target_selection_metric: max_target_logprob
  overrides:
    device: cuda
    last_n_layers: 2
    include_final_norm: true
    include_lm_head: false
    sequence_length: 512

removal:
  enabled: true
  focus_conditions: [C2_exact_10x, C3_fuzzy_5x, C3_fuzzy_10x_event_only]
  focus_seeds: all
  selection_unit_by_condition:
    C2_exact_10x: record
    C3_fuzzy_5x: cluster
    C3_fuzzy_10x_event_only: cluster
  audit_generation_config: configs/generation/budget20_cold_long.yaml
  run_mech_lite: true

storage:
  skip_existing: true
  remove_generation_after_scoring: true
  delete_intermediate_checkpoints: true
  remove_activation_cache_after_mech: true
  remove_removal_models_after_validation: true
  shared_rendered_docs: true
  shared_prompts: true

cluster:
  python_bin: python
  scheduler: slurm
  slurm:
    partition: gpu
    gres: gpu:1
    cpus_per_task: 8
    mem: 80G
    time: "96:00:00"
